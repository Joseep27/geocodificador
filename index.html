let resultados = [];

function pip(lon,lat,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if(((yi>lat)!=(yj>lat))&&(lon<(xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

function classify(lon,lat){
  for(const z of ZONES) if(pip(lon,lat,z.coords)) return {ppal:z.ppal,apoyo:z.apoyo};
  return null;
}

function cleanName(c){
  return c.replace(/^(C\/\s*|AV\.?\s+|PL\s+|PZA?\s+|PTE\s+|GV\s+|CAMI\s+|CTRA\s+|CV\s+|PASEO\s+|CAMINO\s+|CARRERA\s+|RIU\s+)/i,'').trim();
}

async function geocode(calle){
  const q=encodeURIComponent(cleanName(calle)+', Valencia, Spain');
  const url=`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=es&viewbox=-0.45,39.42,-0.29,39.56&bounded=1`;
  try{
    const r=await fetch(url,{headers:{'User-Agent':'ValVBQuiz/1.0'}});
    const d=await r.json();
    if(d&&d.length) return [parseFloat(d[0].lon),parseFloat(d[0].lat)];
  }catch(e){}
  return null;
}

function addLog(msg){
  const d=document.getElementById('log');
  d.style.display='block';
  d.innerHTML+=msg+'<br>';
  d.scrollTop=d.scrollHeight;
}

async function iniciar(){
  document.getElementById('btn').disabled=true;
  document.getElementById('pbwrap').style.display='block';
  resultados=[];
  let ok=0,classified=0;

  for(let i=0;i<CALLES.length;i++){
    const c=CALLES[i];
    document.getElementById('pb').style.width=((i+1)/CALLES.length*100)+'%';
    document.getElementById('status').textContent=`${i+1}/${CALLES.length} — ${c.calle}`;

    const coords=await geocode(c.calle);
    await new Promise(r=>setTimeout(r,1100));

    let ppal='',apoyo='';
    if(coords){
      ok++;
      const z=classify(coords[0],coords[1]);
      if(z){classified++;ppal=z.ppal;apoyo=z.apoyo;}
      if(i%15===0) addLog(`✓ ${c.calle} → ${ppal||'fuera zona'} / ${apoyo}`);
    } else {
      if(i%20===0) addLog(`✗ ${c.calle}`);
    }
    resultados.push({...c,ppal,apoyo});
  }

  document.getElementById('status').textContent=`Completado: ${ok} encontradas, ${classified} clasificadas de ${CALLES.length}`;
  document.getElementById('dlbtn').style.display='block';
  addLog(`--- FIN: ${ok} encontradas, ${classified} clasificadas ---`);
}

function descargar(){
  const header='PARQUE,GRUPO,TIPO,CALLE,1A SALIDA,2A SALIDA\n';
  const rows=resultados.map(r=>{
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    return [esc(r.parque),esc(r.grupo),esc(r.tipo),esc(r.calle),esc(r.ppal),esc(r.apoyo)].join(',');
  }).join('\n');
  const blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='calles_4parques_salidas.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
